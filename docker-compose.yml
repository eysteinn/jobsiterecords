services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobsiterecords
      POSTGRES_PASSWORD: jobsiterecords
      POSTGRES_DB: jobsiterecords
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsiterecords -d jobsiterecords"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://jobsiterecords:jobsiterecords@postgres:5432/jobsiterecords?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-me-in-production
      APP_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DEV_LOG_EMAIL_LINKS: "true"
      PORT: "8080"
      S3_ENDPOINT: minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-localhost:9000}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: jobsiterecords
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PADDLE_API_KEY: ${PADDLE_API_KEY:-}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET:-}
      PADDLE_ENV: ${PADDLE_ENV:-${NEXT_PUBLIC_PADDLE_ENV:-sandbox}}
      PADDLE_PRICE_ID_SOLO_1_MONTHLY: ${PADDLE_PRICE_ID_SOLO_1_MONTHLY:-${NEXT_PUBLIC_PADDLE_PRICE_ID_SOLO_1_MONTHLY:-}}
      PADDLE_PRICE_ID_CREW_5_MONTHLY: ${PADDLE_PRICE_ID_CREW_5_MONTHLY:-${NEXT_PUBLIC_PADDLE_PRICE_ID_CREW_5_MONTHLY:-}}
      PADDLE_PRICE_ID_TEAM_15_MONTHLY: ${PADDLE_PRICE_ID_TEAM_15_MONTHLY:-${NEXT_PUBLIC_PADDLE_PRICE_ID_TEAM_15_MONTHLY:-}}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  worker:
    build:
      context: ./services/api
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://jobsiterecords:jobsiterecords@postgres:5432/jobsiterecords?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-localhost:9000}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: jobsiterecords
      GOTENBERG_URL: http://gotenberg:3000
      WORKER_ROLE: all
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Job Site Records}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      gotenberg:
        condition: service_started

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_GOOGLE_MAPS: ${NEXT_PUBLIC_GOOGLE_MAPS:-${GOOGLE_MAPS:-}}
      API_INTERNAL_URL: http://api:8080
      APP_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_PADDLE_ENV: ${NEXT_PUBLIC_PADDLE_ENV:-sandbox}
      NEXT_PUBLIC_PADDLE_CLIENT_TOKEN: ${NEXT_PUBLIC_PADDLE_CLIENT_TOKEN:-}
      NEXT_PUBLIC_PADDLE_PRICE_ID_SOLO_1_MONTHLY: ${NEXT_PUBLIC_PADDLE_PRICE_ID_SOLO_1_MONTHLY:-}
      NEXT_PUBLIC_PADDLE_PRICE_ID_CREW_5_MONTHLY: ${NEXT_PUBLIC_PADDLE_PRICE_ID_CREW_5_MONTHLY:-}
      NEXT_PUBLIC_PADDLE_PRICE_ID_TEAM_15_MONTHLY: ${NEXT_PUBLIC_PADDLE_PRICE_ID_TEAM_15_MONTHLY:-}
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
