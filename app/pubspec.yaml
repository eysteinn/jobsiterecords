name: jobsiterecords
description: "Field notes for contractors. Photos, voice notes, captions, tags. Free. Local. Private."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1

  camera: ^0.11.0+2
  image_picker: ^1.1.2
  record: 5.1.2
  just_audio: ^0.9.42

  permission_handler: ^11.3.1
  share_plus: ^10.1.3
  url_launcher: ^6.3.1

  archive: ^3.6.1
  intl: ^0.19.0
  collection: ^1.18.0
  flutter_google_places_sdk:
    path: packages/flutter_google_places_sdk
  flutter_dotenv: ^6.0.1
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# record_linux 0.7.2 doesn't implement the newer startStream API. We don't
# target Linux, but the Dart compiler still resolves all platforms. Pull the
# fixed-up record_linux straight from the upstream git so the build can pass.
dependency_overrides:
  record_linux:
    git:
      url: https://github.com/llfbandit/record.git
      path: record_linux
      ref: master
  flutter_google_places_sdk_platform_interface: 0.4.0
  flutter_google_places_sdk_android: 0.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
