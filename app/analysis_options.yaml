include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Vendored plugin example/test apps are not part of the product; analyzing
    # them fails CI (broken package: imports, stale PlaceField enums).
    - packages/**

linter:
  rules:
    prefer_single_quotes: true
    require_trailing_commas: true
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
